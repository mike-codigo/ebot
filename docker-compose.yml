version: '3.8'

services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER:-5546999130505}
      - SITE_URL=${SITE_URL:-https://esistemas.dev.br}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  default:
    name: ebot-network
